server:
  port: 8084

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce-platform
    username: postgres
    password: Admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
razorpay:
  key-id: my key
  key-secret: my secret


resilience4j:
  circuitbreaker:
    instances:

      orderService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        recordExceptions:
          - feign.FeignException

      productService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  timelimiter:
    instances:

      orderService:
        timeoutDuration: 3s

      productService:
        timeoutDuration: 3s


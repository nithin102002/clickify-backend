server:
  port: 8086

spring:
  application:
    name: review-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce-platform
    username: postgres
    password: Admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

server:
  port: 8085


spring:
  application:
    name: cart-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce-platform
    username: postgres
    password: Admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

resilience4j:
  circuitbreaker:
    instances:

      productService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s